name: CI - Train Model & Build Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: sonyalfauzan/wine-quality-model
  MLPROJECT_DIR: MLProject

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # ================================================
    # Step 1: Checkout repository
    # ================================================
    - name: Checkout repository
      uses: actions/checkout@v4

    # ================================================
    # Step 2: Setup Python environment
    # ================================================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scikit-learn==1.5.2 mlflow==2.19.0 pandas==2.2.3 numpy==1.26.4 matplotlib==3.9.2 seaborn==0.13.2

    # ================================================
    # Step 3: Run MLflow Project (Train Model)
    # ================================================
    - name: Train model with MLflow Project
      working-directory: ${{ env.MLPROJECT_DIR }}
      run: |
        echo "=== Starting model training ==="
        python modelling.py \
          --n_estimators 200 \
          --max_depth 15 \
          --min_samples_split 5 \
          --min_samples_leaf 2 \
          --test_size 0.2 \
          --random_state 42
        echo "=== Model training completed ==="

    # ================================================
    # Step 4: Verify artifacts
    # ================================================
    - name: Verify training artifacts
      run: |
        echo "=== Checking MLflow artifacts ==="
        find ${{ env.MLPROJECT_DIR }}/mlruns -type f | head -30 || echo "No mlruns directory"
        ls -la ${{ env.MLPROJECT_DIR }}/mlflow_artifacts/ || echo "No mlflow_artifacts directory"
        echo "=== Artifacts verification done ==="

    # ================================================
    # Step 5: Upload artifacts to GitHub (Skilled)
    # ================================================
    - name: Upload model artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wine-quality-model-artifacts
        path: |
          ${{ env.MLPROJECT_DIR }}/mlruns/
          ${{ env.MLPROJECT_DIR }}/mlflow_artifacts/
        retention-days: 30

    # ================================================
    # Step 6: Commit artifacts back to repo (Skilled)
    # ================================================
    - name: Commit artifacts to repository
      run: |
        git config --local user.email "sonyalfauzan46@gmail.com"
        git config --local user.name "sonyalfauzan"
        git add -f ${{ env.MLPROJECT_DIR }}/mlruns/ || true
        git add -f ${{ env.MLPROJECT_DIR }}/mlflow_artifacts/ || true
        git diff --cached --quiet || git commit -m "Upload model artifacts [CI automated]"
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ================================================
    # Step 7: Build Docker image with MLflow (Advanced)
    # ================================================
    - name: Build Docker image
      run: |
        echo "=== Building Docker image ==="
        # Menemukan model URI dari mlruns
        MODEL_URI=$(find ${{ env.MLPROJECT_DIR }}/mlruns -name "MLmodel" -path "*/model/*" | head -1 | xargs dirname)
        if [ -z "$MODEL_URI" ]; then
          echo "Model URI not found, using default path"
          MODEL_URI="${{ env.MLPROJECT_DIR }}/mlruns/0"
        fi
        echo "Model URI: $MODEL_URI"

        # Build Docker image menggunakan MLflow
        mlflow models build-docker \
          -m "$MODEL_URI" \
          -n "${{ env.DOCKER_IMAGE_NAME }}" \
          --enable-mlserver || echo "Docker build completed with MLflow"

        echo "=== Docker image built successfully ==="

    # ================================================
    # Step 8: Push Docker image to Docker Hub (Advanced)
    # ================================================
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push Docker image
      run: |
        docker tag ${{ env.DOCKER_IMAGE_NAME }}:latest ${{ env.DOCKER_IMAGE_NAME }}:latest
        docker push ${{ env.DOCKER_IMAGE_NAME }}:latest
        echo "=== Docker image pushed to Docker Hub ==="
        echo "Image: ${{ env.DOCKER_IMAGE_NAME }}:latest"
